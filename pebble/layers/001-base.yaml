services:
  sshd:
    override: replace
    summary: OpenSSH server
    command: /bin/sh -c 'exec /usr/sbin/sshd -D -e -p "${SKLEIN_DEVBOX_SSH_PORT:-2222}"'
    startup: enabled
  ssh-agent:
    override: replace
    summary: SSH authentication agent
    # 86400 = 24h identity lifetime
    command: /usr/bin/ssh-agent -D -t 86400 -a /tmp/ssh-agent.sock
    startup: enabled