#:schema https://starship.rs/config-schema.json
"$schema" = 'https://starship.rs/config-schema.json'

format = """
$directory\
$git_branch\
$git_commit\
$git_state\
$git_metrics\
$git_status\
$golang\
$nodejs\
$python\
$terraform\
$memory_usage\
$mise\
$shell\
$character
"""

[character]
success_symbol = "[➜](bold green)"
error_symbol = "[✗](bold red)"
